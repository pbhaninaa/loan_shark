# =============================================================================
# Profile: prod (production). Use with SPRING_PROFILES_ACTIVE=prod on Railway.
# =============================================================================

server.error.whitelabel.enabled=false

# Frontend and CORS – set in Railway env
app.frontend-url=${APP_FRONTEND_URL}
app.frontend-allowed-origins=${APP_FRONTEND_ALLOWED_ORIGINS:}

# Trust proxy so X-Forwarded-* headers from Railway are used (host, scheme, client IP)
server.forward-headers-strategy=framework
server.tomcat.remoteip.remote-ip-header=x-forwarded-for
server.tomcat.remoteip.protocol-header=x-forwarded-proto

# Reduce logging and pool size for low-memory containers
spring.jpa.show-sql=false
spring.datasource.hikari.maximum-pool-size=5
