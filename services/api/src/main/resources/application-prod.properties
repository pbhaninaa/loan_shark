# =============================================================================
# Production Profile - Live Environment (Production Server)
# =============================================================================
# Set these environment variables in Railway/hosting platform:
# SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD,
# JWT_SECRET, APP_FRONTEND_URL, APP_FRONTEND_ALLOWED_ORIGINS,
# MAIL_USERNAME, MAIL_PASSWORD, MAIL_FROM
# =============================================================================

# Database (from environment variables)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# JWT (from environment variables - MUST be secure!)
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}

# Frontend (from environment variables)
app.frontend-url=${APP_FRONTEND_URL}
app.frontend-allowed-origins=${APP_FRONTEND_ALLOWED_ORIGINS}

# Email (from environment variables)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
app.mail.from=${MAIL_FROM}

# Flyway
spring.flyway.enabled=true

# JPA/Hibernate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.hibernate.ddl-auto=validate

# Connection Pool (optimized for production)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Logging
logging.level.root=INFO
logging.level.com.loanshark.api=INFO
logging.level.org.springframework.web=WARN

# Server
server.error.whitelabel.enabled=false
server.forward-headers-strategy=framework
server.tomcat.remoteip.remote-ip-header=x-forwarded-for
server.tomcat.remoteip.protocol-header=x-forwarded-proto
