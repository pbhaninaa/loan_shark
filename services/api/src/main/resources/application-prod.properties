# PROD (Production) - Live deployment (keep memory low for Railway)
# Always return JSON for errors (no HTML); our JsonErrorController handles /error
server.error.whitelabel.enabled=false
# Required env vars on Railway: JWT_SECRET (min 64 chars), SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD, SPRING_PROFILES_ACTIVE=prod
# Set APP_FRONTEND_URL in Railway to your Vercel PROD frontend URL (e.g. https://your-app.vercel.app)
app.frontend-url=${APP_FRONTEND_URL}

# Reduce memory: no SQL logging, small connection pool
spring.jpa.show-sql=false
spring.datasource.hikari.maximum-pool-size=5

# Required for CORS: comma-separated allowed origins or patterns (e.g. https://*.vercel.app for all Vercel).
# Example: https://*.vercel.app or https://your-app.vercel.app,https://your-app-xxx.vercel.app
app.frontend-allowed-origins=${APP_FRONTEND_ALLOWED_ORIGINS:}

# Use X-Forwarded-* headers from Railway proxy so path/scheme/host are correct (avoids 403 on auth endpoints).
server.forward-headers-strategy=framework
# Trust proxy so forwarded host/proto are used (required when app is behind Railway edge).
server.tomcat.remoteip.remote-ip-header=x-forwarded-for
server.tomcat.remoteip.protocol-header=x-forwarded-proto
