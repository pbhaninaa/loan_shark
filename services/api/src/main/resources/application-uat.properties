# =============================================================================
# UAT Profile - Testing
# =============================================================================
# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS}
app.base-url=${APP_BASE_URL}
frontend.base-url=${FRONTEND_BASE_URL}
# Database
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:com.mysql.cj.jdbc.Driver}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=${SPRING_JPA_FORMAT_SQL:true}
spring.jpa.open-in-view=${SPRING_JPA_OPEN_IN_VIEW:false}



# Stripe
stripe.secret-key=${STRIPE_SECRET_KEY}

# Password reset
app.password-reset.base-url=${APP_PASSWORD_RESET_BASE_URL}
app.password-reset.token-valid-hours=${APP_PASSWORD_RESET_TOKEN_VALID_HOURS:24}