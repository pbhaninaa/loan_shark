# Copy this file to application-local.properties and set your values (file is gitignored).
# Required for local run: set spring.datasource.password to your local MySQL root password.

# Database – local MySQL (application-sit already sets url/username; set password here)
spring.datasource.password=your_mysql_password

# Option B: Same DB as Railway (paste MYSQL_PUBLIC_URL value from Railway MySQL service)
# MYSQL_URL=mysql://root:xxx@gondola.proxy.rlwy.net:49401/railway

# JWT – min 64 chars for HS512 (required for local run). Maps to jwt.secret / jwt.expiration in application.properties.
jwt.secret=your_local_jwt_secret_at_least_64_characters_long_for_hs512_change_me
jwt.expiration=86400000

# Mail (e.g. Gmail app password for password reset emails)
# spring.mail.username=your@gmail.com
# spring.mail.password=your_app_password
# app.mail.from=your@gmail.com

# Optional
# app.frontend-url=http://localhost:5173
# stripe.secret-key=sk_test_...
