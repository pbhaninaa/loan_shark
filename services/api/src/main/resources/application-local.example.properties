# =============================================================================
# Example local overrides. Copy this file to application-local.properties (gitignored)
# and set your values. application-local.properties is loaded via spring.config.import.
# =============================================================================

# Database – overrides spring.datasource.* from application-sit.properties for your local MySQL.
spring.datasource.url=jdbc:mysql://localhost:3306/loan_shark?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=YOUR_MYSQL_PASSWORD

# JWT – min length from jwt.min-secret-length (default 64). Overrides jwt.secret and jwt.expiration-ms from application.properties.
jwt.secret=your_local_jwt_secret_at_least_64_characters_long_for_hs512_change_me
jwt.expiration-ms=86400000

# Mail (optional – for password-reset emails)
# spring.mail.username=your@gmail.com
# spring.mail.password=your_app_password
# app.mail.from=your@gmail.com

# Optional
# app.frontend-url=http://localhost:5173
# stripe.secret-key=sk_test_...
