# Copy this file to application-local.properties and set your local values.
# application-local.properties is gitignored and loaded optionally.

# Database – use ONE of the two options below.

# Option A: Same DB as Railway (default – run locally but connect to Railway MySQL)
# Paste your Railway MySQL URL (use MYSQL_PUBLIC_URL when running from your machine).
# Get it from Railway → MySQL service → Variables → MYSQL_PUBLIC_URL (or MYSQL_URL for private).
MYSQL_URL=mysql://root:YOUR_PASSWORD@gondola.proxy.rlwy.net:49401/railway

# Option B: Local MySQL only (comment out MYSQL_URL above and uncomment below)
# spring.datasource.url=jdbc:mysql://localhost:3306/loan_shark
