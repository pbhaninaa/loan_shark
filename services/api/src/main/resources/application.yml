# Loan Shark API – same deployment setup as TestAppBackEnd (Railway, same DB env vars)
# Set SPRING_PROFILES_ACTIVE on Railway: sit | uat | prod
# On Railway: set MYSQL_URL to ${{ YourMySQLService.MYSQL_URL }} for the DB connection (see RailwayMysqlEnvConfig).

spring:
  application:
    name: loan-shark-api
  config:
    import: optional:classpath:application-local.properties
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
        debug: false
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
    open-in-view: false
  datasource:
    url: ${SPRING_DATASOURCE_URL:}
    username: ${SPRING_DATASOURCE_USERNAME:}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-timeout: 20000
      validation-timeout: 5000
      connection-test-query: SELECT 1
  session:
    store-type: none
  flyway:
    enabled: false
  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080
  address: 0.0.0.0

# JWT – set JWT_SECRET in production (min 64 chars for HS512). For local dev set in application-local.properties.
security:
  jwt:
    secret: ${JWT_SECRET:}
    expiration-ms: ${JWT_EXPIRATION_MS:3600000}

# From address for outgoing emails – set MAIL_FROM in production or in application-local.properties
app:
  mail:
    from: ${MAIL_FROM:}
  frontend-url: ${APP_FRONTEND_URL:http://localhost:5173}
  # Comma-separated, no spaces. Include every Vercel URL (production + previews) and localhost.
  frontend-allowed-origins: ${APP_FRONTEND_ALLOWED_ORIGINS:http://localhost:5173,https://localhost:5173}
  password-reset:
    base-url: ${APP_FRONTEND_URL:http://localhost:5173}
    token-valid-hours: 24
  loan:
    default-installments: 4
    max-loan-multiplier: 0.5
  storage:
    kyc-dir: uploads/kyc
  lender:
    name: Loan Shark Lending
    phone: "+27 78 214 1216"
    email: pbhanina@gmail.com
    address: "Ewewe P O Box 47, Qandashe Location, Bizana, 4800"

# Stripe – set STRIPE_SECRET_KEY in production. For local dev set in application-local.properties.
stripe:
  secret-key: ${STRIPE_SECRET_KEY:}
