spring:
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
        debug: false
# From address for outgoing emails - set MAIL_FROM in production (or in application-local.properties for local)
app.mail.from: ${MAIL_FROM:}

# Stripe - set STRIPE_SECRET_KEY in production (e.g. sk_live_...). For local dev set in application-local.properties.
stripe.secret-key: ${STRIPE_SECRET_KEY:}
