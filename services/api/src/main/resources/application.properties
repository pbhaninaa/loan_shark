# =============================================================================
# LendHand API – Base Configuration
# =============================================================================
# This file contains defaults. Override in profile-specific files:
# - application-sit.properties (local development - your laptop)
# - application-uat.properties (UAT server - testing)
# - application-prod.properties (production server - live)
# =============================================================================

spring.application.name=loan-shark-api
spring.main.lazy-initialization=true

# -----------------------------------------------------------------------------
# Server
# -----------------------------------------------------------------------------
server.address=0.0.0.0
server.port=8080

# -----------------------------------------------------------------------------
# Active Profile (default: sit for local development)
# Set SPRING_PROFILES_ACTIVE environment variable to: uat, prod
# -----------------------------------------------------------------------------
spring.profiles.active=${SPRING_PROFILES_ACTIVE:sit}

# -----------------------------------------------------------------------------
# Frontend / CORS
# -----------------------------------------------------------------------------
app.frontend-url=${APP_FRONTEND_URL:http://localhost:5174}
app.frontend-allowed-origins=${APP_FRONTEND_ALLOWED_ORIGINS:http://localhost:5174,http://localhost:5173}

# -----------------------------------------------------------------------------
# JWT Authentication
# -----------------------------------------------------------------------------
jwt.secret=${JWT_SECRET:}
jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}
jwt.min-secret-length=64

# -----------------------------------------------------------------------------
# Database (MySQL)
# -----------------------------------------------------------------------------
spring.datasource.url=${SPRING_DATASOURCE_URL:}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.connection-test-query=SELECT 1

# -----------------------------------------------------------------------------
# JPA / Hibernate
# -----------------------------------------------------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.session.store-type=none
spring.jackson.serialization.write-dates-as-timestamps=false

# -----------------------------------------------------------------------------
# Flyway Migrations
# -----------------------------------------------------------------------------
spring.flyway.enabled=false
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# -----------------------------------------------------------------------------
# Password Reset
# -----------------------------------------------------------------------------
app.password-reset.base-url=${APP_FRONTEND_URL:http://localhost:5174}
app.password-reset.token-valid-hours=24

# -----------------------------------------------------------------------------
# Business Rules
# -----------------------------------------------------------------------------
app.loan.default-installments=4
app.loan.max-loan-multiplier=0.5
app.loan.cashier-approval-limit=10000

# -----------------------------------------------------------------------------
# Rate Limiting
# -----------------------------------------------------------------------------
app.rate-limit.max-attempts-per-minute=20
app.rate-limit.window-seconds=60

# -----------------------------------------------------------------------------
# File Storage
# -----------------------------------------------------------------------------
app.storage.kyc-dir=uploads/kyc

# -----------------------------------------------------------------------------
# Email / SMTP (for password reset and notifications)
# -----------------------------------------------------------------------------
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=${MAIL_FROM:noreply@lendhand.com}

# -----------------------------------------------------------------------------
# Optional: Stripe Payments
# -----------------------------------------------------------------------------
stripe.secret-key=${STRIPE_SECRET_KEY:}
