# =============================================================================
# LendHand API ? Base Configuration (Local Development)
# =============================================================================

spring.application.name=loan-shark-api
spring.main.lazy-initialization=true

server.address=0.0.0.0
server.port=8080

spring.profiles.active=${SPRING_PROFILES_ACTIVE:sit}

app.frontend-url=${APP_FRONTEND_URL:http://localhost:5174}
app.frontend-allowed-origins=${APP_FRONTEND_ALLOWED_ORIGINS:http://localhost:5174,http://localhost:5173}

jwt.secret=${JWT_SECRET:}
jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}
jwt.min-secret-length=64

spring.datasource.url=${SPRING_DATASOURCE_URL:}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.connection-test-query=SELECT 1

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false
spring.session.store-type=none
spring.jackson.serialization.write-dates-as-timestamps=false

spring.flyway.enabled=false
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

app.password-reset.base-url=${APP_FRONTEND_URL:http://localhost:5174}
app.password-reset.token-valid-hours=24

app.loan.default-installments=4
app.loan.max-loan-multiplier=0.5
app.loan.cashier-approval-limit=10000

app.rate-limit.max-attempts-per-minute=20
app.rate-limit.window-seconds=60

app.storage.kyc-dir=uploads/kyc

spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=${MAIL_FROM:noreply@lendhand.com}

stripe.secret-key=${STRIPE_SECRET_KEY:}