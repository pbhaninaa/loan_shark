# =============================================================================
# LendHand API ? Base Configuration (Local Development)
# =============================================================================

spring.application.name=loan-shark-api
spring.main.lazy-initialization=true

server.address=0.0.0.0
server.port=${PORT:8080}

spring.profiles.active=${SPRING_PROFILES_ACTIVE:sit}

app.frontend-url=${APP_FRONTEND_URL:http://localhost:5174}
app.frontend-allowed-origins=${APP_FRONTEND_ALLOWED_ORIGINS:http://localhost:5174,http://localhost:5173}

# =============================================================================
# JWT
# =============================================================================
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}
jwt.min-secret-length=64

# =============================================================================
# DATABASE (Railway MySQL)
# =============================================================================
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.connection-test-query=SELECT 1

# =============================================================================
# JPA
# =============================================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false
spring.session.store-type=none
spring.jackson.serialization.write-dates-as-timestamps=false

# =============================================================================
# FLYWAY
# =============================================================================
spring.flyway.enabled=false
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# =============================================================================
# PASSWORD RESET
# =============================================================================
app.password-reset.base-url=${APP_FRONTEND_URL:http://localhost:5174}
app.password-reset.token-valid-hours=24

# =============================================================================
# LOAN SETTINGS
# =============================================================================
app.loan.default-installments=4
app.loan.max-loan-multiplier=0.5
app.loan.cashier-approval-limit=10000

# =============================================================================
# RATE LIMITING
# =============================================================================
app.rate-limit.max-attempts-per-minute=20
app.rate-limit.window-seconds=60

# =============================================================================
# FILE STORAGE
# =============================================================================
app.storage.kyc-dir=uploads/kyc

# =============================================================================
# MAIL
# =============================================================================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

app.mail.from=${MAIL_FROM:noreply@lendhand.com}

# =============================================================================
# STRIPE
# =============================================================================
stripe.secret-key=${STRIPE_SECRET_KEY}

# =============================================================================
# LOGGING
# =============================================================================
logging.level.root=INFO
logging.level.com.loanshark.api=INFO
logging.level.org.springframework.web=WARN

# =============================================================================
# SERVER
# =============================================================================
server.error.whitelabel.enabled=false
server.forward-headers-strategy=framework
server.tomcat.remoteip.remote-ip-header=x-forwarded-for
server.tomcat.remoteip.protocol-header=x-forwarded-proto