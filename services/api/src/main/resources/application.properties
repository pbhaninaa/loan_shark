# =============================================================================
# Base Configuration (All environments)
# =============================================================================

spring.application.name=loan-shark-api
spring.main.lazy-initialization=true

# -------------------------------------------------------------------------
# Server
# -------------------------------------------------------------------------
server.address=0.0.0.0
server.port=${PORT:8080}
server.error.whitelabel.enabled=false
server.forward-headers-strategy=framework
server.tomcat.remoteip.remote-ip-header=x-forwarded-for
server.tomcat.remoteip.protocol-header=x-forwarded-proto


# Let Hibernate manage the schema
spring.jpa.hibernate.ddl-auto=update

# Optional: show SQL for debugging
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Disable Open-in-view if you don?t need it
spring.jpa.open-in-view=false
# =============================================================================
# Database (Environment-based configuration)
# =============================================================================

# Datasource configuration (resolved from environment variables)
spring.datasource.url=${SPRING_DATASOURCE_URL:${MYSQL_URL:}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${MYSQLUSER:}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${MYSQLPASSWORD:}}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:com.mysql.cj.jdbc.Driver}

# Hibernate dialect (can be overridden per environment)
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.MySQL8Dialect}
# -------------------------------------------------------------------------
# Active Profile (default: sit)
# -------------------------------------------------------------------------
spring.profiles.active=${SPRING_PROFILES_ACTIVE:sit}

# -------------------------------------------------------------------------
# Frontend / CORS
# -------------------------------------------------------------------------
app.frontend-url=${APP_FRONTEND_URL:http://localhost:5174}
app.frontend-allowed-origins=${APP_FRONTEND_ALLOWED_ORIGINS:http://localhost:5174,http://localhost:5173}

# =============================================================================
# JWT
# =============================================================================
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
jwt.min-secret-length=64
app.storage.kyc-dir=C:/path/to/kyc/storage
app.loan.max-loan-multiplier=3

# =============================================================================
# Logging
# =============================================================================
logging.level.root=INFO
logging.level.com.loanshark.api=INFO
logging.level.org.springframework.web=WARN