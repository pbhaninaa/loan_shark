spring.application.name=loan-shark-api

# Frontend URL for reset links and notification links. Override in application-local.properties for local dev.
app.frontend-url=${APP_FRONTEND_URL:http://localhost:5173}
# CORS + link resolution: comma-separated, no spaces. Include Vercel URL(s) and localhost.
app.frontend-allowed-origins=${APP_FRONTEND_ALLOWED_ORIGINS:http://localhost:5173,https://localhost:5173}

# SIT = devs local, UAT = testers deployed, prod = production. Set SPRING_PROFILES_ACTIVE on Railway (uat | prod).
spring.profiles.active=${SPRING_PROFILES_ACTIVE:sit}

spring.config.import=optional:classpath:application-local.properties
server.address=0.0.0.0
server.port=8080

# JWT - set JWT_SECRET in production (min 64 chars for HS512). For local dev set in application-local.properties.
jwt.secret=${JWT_SECRET:}
jwt.expiration=${JWT_EXPIRATION_MS:3600000}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

spring.session.store-type=none
# Database: set via env (SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD) or in profile/local properties (like Mechanic Management).
spring.datasource.url=${SPRING_DATASOURCE_URL:}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.connection-test-query=SELECT 1

spring.flyway.enabled=false
spring.jackson.serialization.write-dates-as-timestamps=false

# Loan Shark app defaults (override via env or application-local)
app.password-reset.base-url=${APP_FRONTEND_URL:http://localhost:5173}
app.password-reset.token-valid-hours=24
app.loan.default-installments=4
app.loan.max-loan-multiplier=0.5
app.storage.kyc-dir=uploads/kyc
app.lender.name=Loan Shark Lending
app.lender.phone=+27 78 214 1216
app.lender.email=pbhanina@gmail.com
app.lender.address=Ewewe P O Box 47, Qandashe Location, Bizana, 4800
