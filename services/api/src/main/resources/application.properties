# =============================================================================
# LendHand API – Configuration (override via env vars or application-<profile>.properties)
# =============================================================================

spring.application.name=loan-shark-api
spring.main.lazy-initialization=true
spring.config.import=optional:classpath:application-local.properties

# -----------------------------------------------------------------------------
# Server
# -----------------------------------------------------------------------------
server.address=0.0.0.0
server.port=8080

# -----------------------------------------------------------------------------
# Active profile: sit (local dev), uat (deployed test), prod (production).
# Set SPRING_PROFILES_ACTIVE on Railway to uat or prod.
# -----------------------------------------------------------------------------
spring.profiles.active=${SPRING_PROFILES_ACTIVE:sit}

# -----------------------------------------------------------------------------
# Frontend / CORS
# app.frontend-url: Used for password-reset links and notifications. Set APP_FRONTEND_URL in production.
# app.frontend-allowed-origins: Comma-separated origins for CORS (e.g. https://your-app.vercel.app). Set APP_FRONTEND_ALLOWED_ORIGINS in production.
# -----------------------------------------------------------------------------
app.frontend-url=${APP_FRONTEND_URL:http://localhost:5173}
app.frontend-allowed-origins=${APP_FRONTEND_ALLOWED_ORIGINS:http://localhost:5173,https://localhost:5173}

# -----------------------------------------------------------------------------
# JWT (used by JwtService for login tokens)
# jwt.secret: Signing secret; must meet min length for HS512. Set JWT_SECRET in production (or in application-local.properties for local).
# jwt.expiration-ms: Token lifetime in milliseconds. Set JWT_EXPIRATION_MS in production (default 1 hour = 3600000).
# jwt.min-secret-length: Minimum byte length for jwt.secret; validation fails at startup if secret is shorter (default 64 for HS512).
# -----------------------------------------------------------------------------
jwt.secret=${JWT_SECRET:}
jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}
jwt.min-secret-length=64

# -----------------------------------------------------------------------------
# Database (MySQL). Set SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD in production or in application-local.properties.
# -----------------------------------------------------------------------------
spring.datasource.url=${SPRING_DATASOURCE_URL:}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.connection-test-query=SELECT 1

# -----------------------------------------------------------------------------
# JPA / Hibernate (profile prod typically sets show-sql=false and ddl-auto per env)
# -----------------------------------------------------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# Dialect auto-detected from JDBC URL (MySQL) - no need to set explicitly in Hibernate 6
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

spring.session.store-type=none
spring.flyway.enabled=false
spring.jackson.serialization.write-dates-as-timestamps=false

# -----------------------------------------------------------------------------
# Password reset (email links). base-url and token-valid-hours used by AuthService.
# -----------------------------------------------------------------------------
app.password-reset.base-url=${APP_FRONTEND_URL:http://localhost:5173}
app.password-reset.token-valid-hours=24

# -----------------------------------------------------------------------------
# Loan rules (used by LoanService, RiskService)
# app.loan.default-installments: (Unused) Schedule installments are derived from loan term and interest period from settings.
# app.loan.max-loan-multiplier: Max loan as fraction of business capital (e.g. 0.5 = 50%).
# app.loan.cashier-approval-limit: Loans below this amount (in currency units) can be approved/rejected by CASHIER; above require OWNER.
# -----------------------------------------------------------------------------
app.loan.default-installments=4
app.loan.max-loan-multiplier=0.5
app.loan.cashier-approval-limit=10000

# -----------------------------------------------------------------------------
# Rate limiting (used by RateLimitFilter on /auth and /loans/apply)
# app.rate-limit.max-attempts-per-minute: Max requests per IP per window before 429.
# app.rate-limit.window-seconds: Window length in seconds (e.g. 60 = one minute).
# -----------------------------------------------------------------------------
app.rate-limit.max-attempts-per-minute=20
app.rate-limit.window-seconds=60

# -----------------------------------------------------------------------------
# Storage and lender contact (used by document uploads and contact endpoints)
# -----------------------------------------------------------------------------
app.storage.kyc-dir=uploads/kyc
app.lender.name=LendHand Lending
app.lender.phone=+27 78 214 1216
app.lender.email=pbhanina@gmail.com
app.lender.address=Ewewe P O Box 47, Qandashe Location, Bizana, 4800

# -----------------------------------------------------------------------------
# Mail (optional; for password-reset emails). Set MAIL_HOST, MAIL_PORT, MAIL_USERNAME, MAIL_PASSWORD, MAIL_FROM in production or application-local.properties.
# -----------------------------------------------------------------------------
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=${MAIL_FROM:}

# -----------------------------------------------------------------------------
# Stripe (optional). Set STRIPE_SECRET_KEY in production or application-local.properties for payments.
# -----------------------------------------------------------------------------
stripe.secret-key=${STRIPE_SECRET_KEY:}
